<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система учёта отзывов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Система учёта отзывов</h1>

    <section>
        <h2>Создание отзыва</h2>
        <form id="recordForm">
            <input id="titleInput" name="title" placeholder="Текст отзыва" />
            <input id="valueInput" name="value" placeholder="Рейтинг (0–1000000)" />
            <input id="createdAtInput" name="createdAt" placeholder="YYYY-MM-DD" />
            <select id="statusInput" name="status">
                <option value="new">new</option>
                <option value="old">old</option>
            </select>
            <button type="submit">Сохранить</button>
        </form>
        <div id="formErrors"></div>
        <button id="loadExternalData">Загрузка внешних записей</button>
    </section>

    <section id="controls">
        <h2>Управление отзывами</h2>
        <div>
            <button id="btnAll">Показать все отзывы</button>
            <button id="btnNew">Показать только NEW</button>
            <button id="btnSort">Сортировать по рейтингу (убыв.)</button>
            <button id="btnStats">Показать статистику</button>
        </div>
        <div id="message"></div>
    </section>

    <section>
        <h2>Список отзывов</h2>
        <div id="list"></div>
    </section>

    <script src="data.js"></script>
    <script src="logic.js"></script>
    <script src="script.js"></script>
</body>
</html>
